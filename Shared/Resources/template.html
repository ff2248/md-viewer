<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- @inline-css -->
</head>
<body>
    <article class="markdown-body" id="content"></article>
    <script>
        // All rendering (highlight, Temml) is pre-done in Swift via JSContext.
        // This JS only handles: setting innerHTML, mermaid, headings, scrolling.

        function renderHTML(base64Html) {
            try {
                var binary = atob(base64Html);
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                document.getElementById('content').innerHTML = new TextDecoder('utf-8').decode(bytes);

                // Mermaid: transform code blocks then render (mermaid.js injected by Swift when needed)
                var mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
                if (mermaidBlocks.length > 0) {
                    mermaidBlocks.forEach(function(cb) {
                        var pre = cb.parentElement;
                        var div = document.createElement('div');
                        div.className = 'mermaid';
                        div.textContent = cb.textContent;
                        // Carry data-sourcepos onto the replacement so
                        // "Copy as Markdown" still resolves selections
                        // that intersect a rendered diagram.
                        var sp = pre.getAttribute('data-sourcepos');
                        if (sp) div.setAttribute('data-sourcepos', sp);
                        pre.parentElement.replaceChild(div, pre);
                    });
                    if (typeof mermaid !== 'undefined') {
                        var mermaidTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
                        mermaid.initialize({ startOnLoad: false, theme: mermaidTheme });
                        mermaid.run();
                    }
                }

                addCopyButtons();
                initTableResize();
                extractHeadings();
            } catch (e) {
                document.getElementById('content').innerHTML =
                    '<p style="color:red;">Rendering error: ' + e.message + '</p>';
            }
        }

        function slugify(text) {
            return text.toLowerCase().trim()
                .replace(/[^\w\s\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af-]/g, '')
                .replace(/\s+/g, '-');
        }

        function extractHeadings() {
            var headings = [];
            var slugCounts = {};
            document.getElementById('content').querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(function(el) {
                var slug = slugify(el.textContent);
                slugCounts[slug] = (slugCounts[slug] || 0) + 1;
                var id = slugCounts[slug] > 1 ? slug + '-' + (slugCounts[slug] - 1) : slug;
                el.id = id;
                headings.push({ id: id, level: parseInt(el.tagName.charAt(1)), text: el.textContent });
            });
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headings) {
                window.webkit.messageHandlers.headings.postMessage(headings);
            }
        }

        function scrollToHeading(id) {
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Returns {startLine, endLine} (1-based, inclusive) covering every block
        // the selection touches, or null if empty. Line numbers match
        // cmark-gfm's sourcepos output.
        //
        // We scan every [data-sourcepos] block and collect those the selection
        // Range intersects — NOT just walking up from the endpoints. Walking
        // endpoints misses atomic inline elements (rendered <math>, images,
        // SVGs) that WebKit skips over when computing startContainer/
        // endContainer: a selection that visually crosses a formula often has
        // endpoints in the surrounding paragraphs, so the formula's own block
        // would never be seen. intersectsNode catches it.
        function getSelectedBlockRange() {
            var sel = window.getSelection();
            if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
            var range = sel.getRangeAt(0);

            var minStart = Infinity;
            var maxEnd = -Infinity;
            var blocks = document.querySelectorAll('[data-sourcepos]');
            for (var i = 0; i < blocks.length; i++) {
                var el = blocks[i];
                if (!range.intersectsNode(el)) continue;
                var attr = el.getAttribute('data-sourcepos');
                var dash = attr.indexOf('-');
                if (dash < 0) continue;
                var s = parseInt(attr, 10);             // parseInt stops at ':'
                var e = parseInt(attr.slice(dash + 1), 10);
                if (isNaN(s) || isNaN(e)) continue;
                if (s < minStart) minStart = s;
                if (e > maxEnd) maxEnd = e;
            }
            if (minStart === Infinity) return null;
            return { startLine: minStart, endLine: maxEnd };
        }

        var copySvg = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>';
        var checkSvg = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>';

        function addCopyButtons() {
            document.querySelectorAll('pre > code').forEach(function(code) {
                var pre = code.parentElement;
                if (pre.querySelector('.copy-btn')) return;
                pre.style.position = 'relative';
                var btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = copySvg;
                btn.addEventListener('click', function() {
                    navigator.clipboard.writeText(code.textContent).then(function() {
                        btn.innerHTML = checkSvg;
                        btn.classList.add('copied');
                        setTimeout(function() {
                            btn.innerHTML = copySvg;
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                });
                pre.appendChild(btn);
            });
        }

        // ─── Table column resize (runtime only, not persisted) ───
        var COL_MIN_W = 24;
        function pinWidth(th, px) {
            th.style.width = th.style.minWidth = th.style.maxWidth = px + 'px';
        }
        function initTableResize() {
            document.querySelectorAll('#content table').forEach(function(table) {
                var headers = table.querySelectorAll('thead tr:first-child th');
                if (headers.length === 0) return;
                headers.forEach(function(th) {
                    var handle = document.createElement('span');
                    handle.className = 'col-resize-handle';
                    handle.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        var startX = e.clientX;
                        var startWidth = th.offsetWidth;
                        document.body.classList.add('col-resizing');
                        handle.classList.add('dragging');
                        function onMove(ev) {
                            // Max = current viewport width minus body horizontal padding (40px each side).
                            // Read at drag time, not init, so window resize is always respected.
                            var colMax = Math.max(COL_MIN_W, window.innerWidth - 80);
                            var w = Math.min(colMax, Math.max(COL_MIN_W, startWidth + (ev.clientX - startX)));
                            pinWidth(th, w);
                        }
                        function stop() {
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('mouseup', stop);
                            window.removeEventListener('blur', stop);
                            document.body.classList.remove('col-resizing');
                            handle.classList.remove('dragging');
                        }
                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('mouseup', stop);
                        window.addEventListener('blur', stop);
                    });
                    // Double-click → auto-fit to single-line max-content (Excel-style).
                    // Table-layout constraints (display:block, max-width:100%) make
                    // it unreliable to read offsetWidth after clearing the width.
                    // Instead, measure each cell's content width directly in an
                    // offscreen white-space:nowrap element that inherits font metrics.
                    handle.addEventListener('dblclick', function(e) {
                        e.preventDefault();
                        var colIdx = Array.prototype.indexOf.call(th.parentNode.children, th);
                        var cells = [th];
                        table.querySelectorAll('tbody > tr').forEach(function(tr) {
                            if (tr.children[colIdx]) cells.push(tr.children[colIdx]);
                        });
                        // Measurer must live inside .markdown-body so that
                        // descendant CSS rules (e.g. `.markdown-body code`
                        // monospace font, padding, background) apply to the
                        // cloned content — otherwise inline code and other
                        // styled inline elements get under-measured.
                        var host = table.closest('.markdown-body') || document.body;
                        var measurer = document.createElement('div');
                        measurer.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;';
                        host.appendChild(measurer);
                        var maxW = 0;
                        cells.forEach(function(cell) {
                            var cs = window.getComputedStyle(cell);
                            measurer.style.fontFamily = cs.fontFamily;
                            measurer.style.fontSize = cs.fontSize;
                            measurer.style.fontWeight = cs.fontWeight;
                            measurer.style.fontStyle = cs.fontStyle;
                            measurer.innerHTML = cell.innerHTML;
                            measurer.querySelectorAll('.col-resize-handle').forEach(function(h) { h.remove(); });
                            var padH = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
                            var w = measurer.offsetWidth + padH;
                            if (w > maxW) maxW = w;
                        });
                        host.removeChild(measurer);
                        pinWidth(th, Math.ceil(maxW));
                    });
                    th.appendChild(handle);
                });
            });
        }

        // ─── Find in page ───
        var _findMarks = [];
        var _findIndex = -1;

        function findInPage(query) {
            clearFind();
            if (!query) return { total: 0, current: 0 };
            var content = document.getElementById('content');
            var skipTags = {SCRIPT:1, STYLE:1, SVG:1, NOSCRIPT:1, MARK:1};
            var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                    var p = node.parentNode;
                    while (p && p !== content) {
                        var tag = (p.tagName || '').toUpperCase();
                        if (skipTags[tag]) return NodeFilter.FILTER_REJECT;
                        p = p.parentNode;
                    }
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            var textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);
            var lowerQuery = query.toLowerCase();
            textNodes.forEach(function(node) {
                var text = node.textContent;
                var lower = text.toLowerCase();
                var idx = 0;
                while ((idx = lower.indexOf(lowerQuery, idx)) !== -1) {
                    var range = document.createRange();
                    range.setStart(node, idx);
                    range.setEnd(node, idx + query.length);
                    var mark = document.createElement('mark');
                    mark.className = 'find-match';
                    try {
                        range.surroundContents(mark);
                        _findMarks.push(mark);
                    } catch(e) { /* skip cross-element matches */ }
                    // After surroundContents, the text node is split — advance walker
                    node = mark.nextSibling;
                    if (!node) break;
                    lower = node.textContent.toLowerCase();
                    idx = 0;
                }
            });
            if (_findMarks.length > 0) {
                _findIndex = 0;
                _findMarks[0].classList.add('find-current');
                _findMarks[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            return { total: _findMarks.length, current: _findMarks.length > 0 ? 1 : 0 };
        }

        function gotoMatch(delta) {
            var n = _findMarks.length;
            if (n === 0) return { total: 0, current: 0 };
            _findMarks[_findIndex].classList.remove('find-current');
            _findIndex = (_findIndex + delta + n) % n;
            _findMarks[_findIndex].classList.add('find-current');
            _findMarks[_findIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return { total: n, current: _findIndex + 1 };
        }

        function findNext() { return gotoMatch(1); }
        function findPrev() { return gotoMatch(-1); }

        function clearFind() {
            _findMarks.forEach(function(mark) {
                var parent = mark.parentNode;
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            });
            _findMarks = [];
            _findIndex = -1;
        }

        // Intercept link clicks and route through Swift
        document.addEventListener('click', function(e) {
            var link = e.target.closest('a');
            if (!link) return;
            var href = link.getAttribute('href');
            if (!href) return;

            // Anchor links — handle in-page
            if (href.startsWith('#')) {
                var target = document.getElementById(href.substring(1));
                if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
                return;
            }

            // Send all other links to Swift for routing
            e.preventDefault();
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.linkClicked) {
                window.webkit.messageHandlers.linkClicked.postMessage(href);
            }
        });
    </script>
</body>
</html>
