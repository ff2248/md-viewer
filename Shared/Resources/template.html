<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="github-markdown.css">
    <link rel="stylesheet" href="github.min.css">
    <link rel="stylesheet" href="katex.min.css">
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 16px 40px 40px 40px;
            background: #ffffff;
        }
        .markdown-body { font-size: 16px; }
        .task-list-item { list-style-type: none; }
        .task-list-item input[type="checkbox"] { margin: 0 0.2em 0.25em -1.6em; }
    </style>
</head>
<body>
    <article class="markdown-body" id="content"></article>

    <script src="markdown-it.min.js"></script>
    <script src="markdown-it-emoji.min.js"></script>
    <script src="markdown-it-task-lists.min.js"></script>
    <script src="markdown-it-front-matter.min.js"></script>
    <script src="katex.min.js"></script>
    <script src="markdown-it-texmath.min.js"></script>
    <script src="highlight.min.js"></script>
    <script src="hljs-typescript.min.js"></script>
    <script src="hljs-swift.min.js"></script>
    <script src="hljs-kotlin.min.js"></script>
    <script src="hljs-rust.min.js"></script>
    <script src="hljs-go.min.js"></script>
    <script src="hljs-ruby.min.js"></script>
    <script src="hljs-yaml.min.js"></script>
    <script src="hljs-dockerfile.min.js"></script>
    <script src="hljs-diff.min.js"></script>

    <script>
        // Initialize markdown-it once (reused across renders)
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: false,
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try { return hljs.highlight(str, { language: lang }).value; } catch (_) {}
                }
                return '';
            }
        });
        md.use(window.markdownitEmoji);
        md.use(window.markdownitTaskLists, { enabled: true, label: true });
        md.use(window.markdownitFrontMatter, function() {});
        md.use(window.texmath, { engine: katex, delimiters: 'dollars' });

        function renderMarkdown(base64Text) {
            try {
                var binary = atob(base64Text);
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                var text = new TextDecoder('utf-8').decode(bytes);

                document.getElementById('content').innerHTML = md.render(text);

                // Add IDs to headings and extract TOC
                extractHeadings();

                // Mermaid: transform code blocks then lazy-load
                var mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
                mermaidBlocks.forEach(function(codeBlock) {
                    var pre = codeBlock.parentElement;
                    var div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = codeBlock.textContent;
                    pre.parentElement.replaceChild(div, pre);
                });
                if (document.querySelectorAll('.mermaid').length > 0) {
                    if (typeof mermaid !== 'undefined') {
                        mermaid.run();
                    } else {
                        var script = document.createElement('script');
                        script.src = 'mermaid.min.js';
                        script.onload = function() {
                            mermaid.initialize({ startOnLoad: false, theme: 'default' });
                            mermaid.run();
                        };
                        document.head.appendChild(script);
                    }
                }
            } catch (e) {
                document.getElementById('content').innerHTML =
                    '<p style="color:red;">Rendering error: ' + e.message + '</p>';
            }
        }

        function extractHeadings() {
            var headings = [];
            var els = document.getElementById('content').querySelectorAll('h1, h2, h3, h4, h5, h6');
            els.forEach(function(el, i) {
                var id = 'heading-' + i;
                el.id = id;
                headings.push({
                    id: id,
                    level: parseInt(el.tagName.charAt(1)),
                    text: el.textContent
                });
            });
            // Send to Swift if message handler is available
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headings) {
                window.webkit.messageHandlers.headings.postMessage(headings);
            }
        }

        function scrollToHeading(id) {
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // renderMarkdown() is called from Swift via evaluateJavaScript
    </script>
</body>
</html>
