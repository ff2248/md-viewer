<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="github-markdown.css">
    <link rel="stylesheet" href="github.min.css">
    <link rel="stylesheet" href="katex.min.css">
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 16px 40px 40px 40px;
            background: #ffffff;
        }
        .markdown-body { font-size: 16px; }
        .task-list-item { list-style-type: none; }
        .task-list-item input[type="checkbox"] { margin: 0 0.2em 0.25em -1.6em; }
    </style>
</head>
<body>
    <article class="markdown-body" id="content"></article>

    <!--
        JS libraries are NOT loaded via <script src> because WKWebView's
        module/exports globals break UMD detection. Instead, JS is injected
        by Swift via evaluateJavaScript after this template loads.
    -->

    <script>
        function renderHTML(base64Html) {
            try {
                var binary = atob(base64Html);
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                var html = new TextDecoder('utf-8').decode(bytes);

                document.getElementById('content').innerHTML = html;

                // Syntax highlighting (hljs injected by Swift)
                if (typeof hljs !== 'undefined') {
                    document.querySelectorAll('pre code').forEach(function(block) {
                        hljs.highlightElement(block);
                    });
                }

                // Math rendering (katex + renderMathInElement injected by Swift)
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(document.getElementById('content'), {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }

                // Mermaid (lazy-loaded by Swift only when needed)
                var mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
                mermaidBlocks.forEach(function(codeBlock) {
                    var pre = codeBlock.parentElement;
                    var div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = codeBlock.textContent;
                    pre.parentElement.replaceChild(div, pre);
                });
                if (document.querySelectorAll('.mermaid').length > 0 && typeof mermaid !== 'undefined') {
                    mermaid.initialize({ startOnLoad: false, theme: 'default' });
                    mermaid.run();
                }

                extractHeadings();
            } catch (e) {
                document.getElementById('content').innerHTML =
                    '<p style="color:red;">Rendering error: ' + e.message + '</p>';
            }
        }

        function extractHeadings() {
            var headings = [];
            document.getElementById('content').querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(function(el, i) {
                var id = 'heading-' + i;
                el.id = id;
                headings.push({ id: id, level: parseInt(el.tagName.charAt(1)), text: el.textContent });
            });
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.headings) {
                window.webkit.messageHandlers.headings.postMessage(headings);
            }
        }

        function scrollToHeading(id) {
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
