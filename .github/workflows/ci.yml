name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        run: brew install xcodegen swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Lint
        run: swiftformat --lint MDViewer Shared MDViewerQuickLook Tests --swiftversion 6

      - name: Test
        run: |
          xcodebuild -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Debug \
            -derivedDataPath build \
            -enableCodeCoverage YES \
            test
