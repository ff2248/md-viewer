name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test
        run: |
          xcodebuild -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Debug \
            -derivedDataPath build \
            test

      - name: Build
        run: |
          BUILD_NUMBER=$(date +%s)
          xcodebuild -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            build

      - name: Create DMG
        run: |
          DMG_NAME="MDViewer-${GITHUB_REF_NAME}.dmg"
          scripts/create_dmg.sh "build/Build/Products/Release/MDViewer.app" "$DMG_NAME"
          shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.DMG_NAME }}.sha256

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Update Homebrew Cask
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(awk '{print $1}' "${DMG_NAME}.sha256")
          scripts/update_homebrew_cask.sh "$VERSION" "$SHA256"
