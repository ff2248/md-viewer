name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test
        run: |
          xcodebuild -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Debug \
            -derivedDataPath build \
            test

      - name: Build
        run: |
          xcodebuild -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Validate build output
        run: test -d "build/Build/Products/Release/MDViewer.app" || exit 1

      - name: Create DMG
        run: |
          DMG_NAME="MDViewer-${GITHUB_REF_NAME}.dmg"
          scripts/create_dmg.sh "build/Build/Products/Release/MDViewer.app" "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate checksum
        run: shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.DMG_NAME }}.sha256
