name: MDViewer
options:
  bundleIdPrefix: io.github.ff2248
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"

packages:
  swift-cmark-gfm:
    url: https://github.com/stackotter/swift-cmark-gfm
    from: 1.0.0

targets:
  MDViewer:
    type: application
    platform: macOS
    sources:
      - path: MDViewer
      - path: Shared
        excludes:
          - "Resources/**"
      - path: Shared/Resources
        buildPhase: resources
      - path: ThirdPartyNotices.txt
        buildPhase: resources
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MDViewer/MDViewer.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ff2248.MDViewer
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: MDViewer/Info.plist
      properties:
        CFBundleDisplayName: MDViewer
        NSHumanReadableCopyright: ""
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
    dependencies:
      - target: MDViewerQuickLook
      - package: swift-cmark-gfm
        product: CMarkGFM

  MDViewerQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: MDViewerQuickLook
      - path: Shared
        excludes:
          - "Resources/**"
      - path: Shared/Resources
        buildPhase: resources
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MDViewerQuickLook/MDViewerQuickLook.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ff2248.MDViewer.QuickLook
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_APP_SANDBOX: YES
        INFOPLIST_FILE: MDViewerQuickLook/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - package: swift-cmark-gfm
        product: CMarkGFM

  MDViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MDViewer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
